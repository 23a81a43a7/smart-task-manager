version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: smart-task-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - task-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: smart-task-server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/taskmanager
      - JWT_SECRET=supersecretkey123
      - NODE_ENV=production
    depends_on:
      - mongodb
    networks:
      - task-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: smart-task-client
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - task-network

volumes:
  mongo-data:

networks:
  task-network:
    driver: bridge
